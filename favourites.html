    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Favourites - Design Wallet™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" sizes="16x16" href="public/Logo/favicon-img/icon16.png">
    <link rel="apple-touch-icon" sizes="128x128" href="public/Logo/favicon-img/icon128.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="index.html" aria-label="Design Wallet home">
                <img class="brand-logo" src="public/Logo/Website-logo.svg" alt="Design Wallet">
            </a>

            <nav class="site-nav" id="primary-nav">
                <a href="index.html#submit">GOOD DEALS 🔥</a>
                <a href="index.html#submit">LIST YOUR TOOLS</a>
                <button class="nav-fav-count" id="nav-fav-count" type="button" aria-label="Favourites" hidden>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span id="nav-fav-number">0</span>
                </button>
                <button class="nav-login-btn" id="nav-user-btn" type="button">LOGIN</button>
            </nav>
        </header>

        <main class="fav-page">
            <div class="fav-page-header">
                <a href="index.html" class="fav-back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back
                </a>
                <h1>Your Favourites</h1>
            </div>

            <p class="fav-page-empty" id="fav-page-empty" hidden>You haven't favourited any tools yet.</p>
            <p class="fav-page-login" id="fav-page-login" hidden>Please log in to view your favourites.</p>

            <div class="resource-grid" id="fav-grid" aria-live="polite"></div>
        </main>

        <footer class="site-footer"></footer>
    </div>

    <!-- Login Modal -->
    <div class="login-modal-overlay" id="login-modal" hidden>
        <div class="login-modal">
            <button class="login-modal-close" id="login-modal-close" type="button" aria-label="Close">&times;</button>
            <h3>Sign in to save favourites</h3>
            <p>Login with your Google account to bookmark your favourite design resources.</p>
            <div id="google-signin-btn"></div>
        </div>
    </div>

    <script src="footer.js"></script>
    <script src="script.js"></script>
