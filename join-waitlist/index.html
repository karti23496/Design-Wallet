<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Waitlist | Design Wallet</title>
    <meta
        name="description"
        content="Join the Design Wallet waitlist for weekly design resources, freebies, and exclusive discounts."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Geist+Mono:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/logo/favicon-img/icon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/logo/favicon-img/icon16.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/public/logo/favicon-img/icon128.png">
    <link rel="canonical" href="https://www.designwallet.in/join-waitlist">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="waitlist-route-page" data-waitlist-route-page>
    <main class="waitlist-route-shell">
        <a class="waitlist-route-brand" href="/" aria-label="Design Wallet home">
            <img src="/public/logo/Website-logo.png" alt="">
            <span>Design Wallet</span>
        </a>
        <div class="waitlist-route-copy" aria-hidden="true">
            <p>All-in-one design library for curious designers.</p>
        </div>
    </main>

    <div class="waitlist-modal" id="waitlist-modal" role="dialog" aria-modal="true" aria-labelledby="waitlist-modal-title">
        <div class="waitlist-modal-backdrop" data-waitlist-close></div>
        <div class="waitlist-modal-card">
            <button type="button" class="waitlist-modal-close" data-waitlist-close aria-label="Close waitlist form">x</button>
            <img class="waitlist-modal-image" src="/public/images/9a569248-298d-4ea7-a061-15573df76ee5.png" alt="" aria-hidden="true">
            <h2 id="waitlist-modal-title">Designer’s Weekly Drop.</h2>
            <p class="waitlist-modal-kicker">Get curated resources, tools, and inspiration—straight to your inbox.</p>
            <form class="waitlist-form">
                <label class="waitlist-field">
                    <span>Email ID</span>
                    <input type="email" class="waitlist-email-input" name="email" placeholder="you@example.com" required autofocus>
                </label>
                <button type="submit" class="primary-button waitlist-submit-button">Submit</button>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
