<body>
    <div class="page-shell">
        <header class="site-header"></header>

        <main class="tool-page">
            <div class="tool-container">
                <div class="tool-loading" id="tool-loading">Loading tools...</div>

                <div class="category-index-content" id="category-index-content" hidden>
                    <div class="category-page-head">
                        <a href="/" class="tool-back-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
                            Back to home
                        </a>
                        <div class="category-index-head-row">
                            <div>
                                <p class="section-kicker">TOOLS INDEX</p>
                                <h1>Browse by category.</h1>
                                <p>Choose a category to see the relevant tools in that collection.</p>
                            </div>
                            <button class="category-search-trigger" type="button" data-category-search-open>
                                Search categories
                                <kbd>⌘K</kbd>
                            </button>
                        </div>
                    </div>

                    <div class="category-grid" id="category-grid" aria-live="polite"></div>
                </div>

                <div class="category-list-content" id="category-list-content" hidden>
                    <div class="category-page-head">
                        <a href="/tools/" class="tool-back-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
                            All categories
                        </a>
                        <p class="section-kicker">CATEGORY</p>
                        <h1 id="category-title"></h1>
                    </div>

                    <div class="resource-grid category-tool-grid" id="category-tool-grid" aria-live="polite"></div>
                </div>

                <div class="tool-content" id="tool-content" hidden>
                    <div class="tool-layout">
                        <div class="tool-info-panel">
                            <a href="/tools/" class="tool-back-link" id="tool-back-link">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
                                Back to categories
                            </a>

                            <div class="tool-header">
                                <div class="tool-header-left">
                                    <div class="tool-icon" id="tool-icon"></div>
                                    <div class="tool-header-info">
                                        <h1 id="tool-title"></h1>
                                        <p class="tool-subtitle" id="tool-subtitle"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="tool-meta">
                                <div class="tool-meta-item" id="tool-categories-wrap">
                                    <div class="tool-meta-tags" id="tool-categories"></div>
                                </div>
                            </div>

                            <div class="tool-header-right">
                                <a class="tool-visit-btn" id="tool-visit-btn" href="#" target="_blank" rel="noreferrer">
                                    Visit Website
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                                </a>
                            </div>
                        </div>

                        <div class="tool-preview-panel">
                            <div class="tool-screenshot" id="tool-screenshot"></div>
                        </div>
                    </div>

                    <div class="tool-nav" id="tool-nav">
                        <a class="tool-nav-link tool-nav-prev" id="tool-prev" href="#">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
                            <span id="tool-prev-name"></span>
                        </a>
                        <a class="tool-nav-link tool-nav-next" id="tool-next" href="#">
                            <span id="tool-next-name"></span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H19M19 12L12 5M19 12L12 19"/></svg>
                        </a>
                    </div>
                </div>

                <div class="tool-not-found" id="tool-not-found" hidden>
                    <h2>Tool not found</h2>
                    <p>The tool you're looking for doesn't exist or has been removed.</p>
                    <a href="/tools/" class="tool-visit-btn">Browse categories</a>
                </div>
            </div>
        </main>

        <footer class="site-footer"></footer>
    </div>

    <div class="category-search-modal" id="category-search-modal" role="dialog" aria-modal="true" aria-labelledby="category-search-title" hidden>
        <div class="category-search-backdrop" data-category-search-close></div>
        <div class="category-search-panel">
            <div class="category-search-input-row">
                <label class="category-search-label" for="category-search-input" id="category-search-title">Search categories</label>
                <input id="category-search-input" type="search" autocomplete="off" placeholder="Search Design Inspirations, AI Tools, UX Tools...">
                <button type="button" class="category-search-close" data-category-search-close aria-label="Close search">x</button>
            </div>
            <div class="category-search-results" id="category-search-results" aria-live="polite"></div>
        </div>
    </div>

    <script src="/content.js"></script>
    <script src="/header.js?v=20260505-1"></script>
    <script src="/footer.js"></script>
    <script src="/tools/tools.js?v=20260505-1"></script>
